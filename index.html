<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Author of This webpage is Cyrus Jones -->
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lines Connect</title>
        <link rel = "stylesheet" href="assets/css/reset.css">
        <link rel = "stylesheet" href="assets/css/variables.css">
        <link rel = "stylesheet" href="assets/css/global.css">
        <link rel = "stylesheet" href="assets/css/layout.css">
        <link rel = "stylesheet" href="assets/css/components.css">
        <link rel = "stylesheet" href="assets/css/pages/home.css">
    </head>
    <body>
        <header class="site-header">
            <section class="header-content">
                <img src="assets/images/logo/logo.png"
                        alt="Lines Connect Logo"
                    loading="eager"
                    decoding="async"
                    fetchpriority="high"
                        class="site-logo">
                <h1 class="site-title">Lines Connect</h1>
            </section>
        </header>
        <div class="hero">
            <div class="hero-container">
            <img src="assets/images/hero/hero_image.png"
                alt="Featured Lines Connect artwork"
                loading="eager"
                decoding="async"
                fetchpriority="high"
                class="hero-img">
            </div>
        </div>
        <main>            
            <div id="hub-navigation">
                <div class = "primary-row">
                    <a class="nav-tile large portfolio" href="portfolio/index.html">
                        <span class="label">Portfolio</span>
                    </a>
                    <a class = "nav-tile large store" href = "store/index.html">
                        <span class="label">Store</span>
                    </a>
                </div>
                <div class = "secondary-row">
                    <a class="nav-tile medium contact" href="contact/index.html">
                        <span class="label">Contact</span>
                    </a>
                    <a class="nav-tile medium about" href="about/index.html">
                        <span class="label">About</span>
                    </a>
                </div>
            </div>
            <div id="social-row">
                <div>
                    <a class="nav-tile" href="https://www.youtube.com/@linesconnect">
                        <img src="assets/icons/icons8-youtube-50.png" alt="YouTube" class="social-icon" loading="lazy" decoding="async">
                        <span>Youtube</span>
                    </a>
                </div>
                <div>
                    <a class ="nav-tile" href="https://www.instagram.com/lines_connect/">
                        <img src="assets/icons/icons8-instagram-50.png" alt="Instagram" class="social-icon" loading="lazy" decoding="async">
                        <span>Instagram</span>
                    </a>
                </div>
                <div>
                    <a class="nav-tile" href="https://www.tiktok.com/@__lines">
                        <img src="assets/icons/icons8-tiktok-50.png" alt="TikTok" class="social-icon" loading="lazy" decoding="async">
                        <span>Tik-Tok</span>
                    </a>
                </div>
                <div>
                    <a class = "nav-tile" href = "https://x.com/Lines_connect">
                        <img src="assets/icons/icons8-x-50.png" alt="X" class="social-icon" loading="lazy" decoding="async">
                        <span>X</span>
                    </a>
                </div>
                <div>
                    <a class = "nav-tile" href="https://www.twitch.tv/lines__connect">
                        <img src="assets/icons/icons8-twitch-96.png" alt="Twitch" class="social-icon" loading="lazy" decoding="async">
                        <span>Twitch</span>
                    </a>
                </div>
                <div>
                    <a class="nav-tile" href="https://www.fiverr.com/s/NN6gLy8">
                        <img src="assets/icons/icons8-fiverr-100.png" alt="Fiverr" class="social-icon" loading="lazy" decoding="async">
                        <span>Fiverr</span>
                    </a>
                </div>
            </div>
        </main>
    </body>
</html>
